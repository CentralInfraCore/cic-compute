---
metadata:
  name: Behavior
  version: v0.0.dev
  description: >
    Egy entitáson végrehajtható műveletet leíró atomic primitive.
    A Behavior mondja meg milyen interakciók lehetségesek a management plane és az entitás között
    a config/state read-write-on túl. Az OperationSurface.operations Behavior-okból áll.
  owner: Gabor Zoltan Sinko
  tags:
    - primitive
    - atomic
    - behavior
  validatedBy:
    name: cic-primitives
    version: v0.0.dev

spec:
  kind: AtomicPrimitive

  types:
    rpc:
      description: >
        Kérés/válasz — entitástól független, top-level művelet.
        Nincs erős kötése egyetlen példányhoz sem. Pl. validate-config, ping, dry-run.
      yang_mapping: top-level rpc statement
      api_mapping: "POST /operations/{name} (nem resource-specifikus path)"
      runtime_mapping: global handler, nincs instance context
      properties:
        synchronous: true
        stateful: false

    action:
      description: >
        Entitáshoz kötött, állapotot módosító művelet. Az adott példányon fut.
        Pl. restart, drain, flush-cache, force-reconcile.
      yang_mapping: action statement inside container/list
      api_mapping: "POST /{resource}/{id}/operations/{name}"
      runtime_mapping: instance-bound handler, van entity context
      properties:
        synchronous: varies
        stateful: true

    operation:
      description: >
        Magasabb szintű lifecycle-hoz kötött művelet — tipikusan több lépésből áll,
        orchestrált végrehajtással. Pl. migrate, scale, upgrade, backup/restore.
      yang_mapping: action statement — de orchestration layer kezeli
      api_mapping: "POST /{resource}/{id}/operations/{name} → async job"
      runtime_mapping: workflow engine / long-running job
      properties:
        synchronous: false
        stateful: true
        returns: job-reference

  fields:
    description: Egy Behavior definíciójának kötelező és opcionális mezői
    properties:
      name:
        type: string
        description: A művelet neve — igés forma ajánlott (restart, drain, validate)
      type:
        type: string
        enum: [rpc, action, operation]
        description: A behavior típusa (lásd types fent)
      input:
        type: reference
        description: >
          A bemeneti paraméterek sémája — Shape referencia vagy inline Shape.
          Lehet üres ha a műveletnek nincs paramétere.
        optional: true
      output:
        type: reference
        description: >
          A kimeneti struktúra sémája — Shape referencia vagy inline Shape.
          Lehet üres ha a művelet nem ad vissza adatot.
        optional: true
      idempotent:
        type: boolean
        default: false
        description: >
          Ha true, a művelet többszöri végrehajtása ugyanazt az eredményt adja.
          Hatással van a retry logikára és az audit értelmezésére.
      description:
        type: string
        description: A művelet célja és mellékhatásai

  semantic_mapping:
    yang:
      rpc: "rpc <name> { input { ... } output { ... } }"
      action: "action <name> { input { ... } output { ... } }"
    api:
      note: minden Behavior POST végpontként jelenik meg — nincs idempotens HTTP verb
    runtime:
      note: a dispatcher a type alapján választ sync/async handler-t
