---
metadata:
  name: ComputeResource
  version: v0.0.dev
  description: >
    Egységes compute erőforrás — hypervisor VM, bare metal fizikai szerver és cloud instance
    egyaránt leírható. A paradigma (vm/physical/cloud) az adapter és az address rétegben van,
    nem a config_surface-ben. Az adapter deklarálja a támogatott capability-ket.
  owner: Gabor Zoltan Sinko
  tags:
    - domain-composition
    - compute
  validatedBy:
    name: cic-primitives
    version: v0.1.0

spec:
  kind: DomainComposition
  base:
    aggregate: ManagedEntity
    ref: schemas/aggregate/managed-entity.yaml

  # ── Identity ────────────────────────────────────────────────────────────────
  identity:
    atomic_ref: schemas/atomic/identity.yaml
    kind: ComputeResource
    namespace: "cic:compute"
    version: v0.1.dev
    base: "cic:core:ManagedEntity"
    abstract: false
    description: Platform-agnosztikus compute erőforrás

  # ── ConfigSurface ────────────────────────────────────────────────────────────
  config_surface:
    aggregate_ref: schemas/aggregate/config-surface.yaml
    nodes:
      - name: cpu_cores
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: config
        mandatory: true
        description: CPU magok száma
        contract:
          - type: range
            expression: "1..256"

      - name: memory_mb
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: config
        mandatory: true
        description: Memória MB-ban
        contract:
          - type: range
            expression: "128..1048576"

      - name: disk_gb
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: config
        mandatory: true
        description: Elsődleges lemez GB-ban
        contract:
          - type: range
            expression: "1..65536"

      - name: os_image
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: string
        role: config
        mandatory: true
        description: OS image azonosítója (platform-specifikus alias vagy ID)

      - name: network_interfaces
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: collection
        collection_variant: list
        role: config
        optional: true
        description: Hálózati interfészek
        item_fields:
          - name: name
            shape_type: scalar
            scalar_type: string
            role: key
          - name: network
            shape_type: scalar
            scalar_type: string
          - name: mac_address
            shape_type: scalar
            scalar_type: string
            optional: true

      # capability: spot — csak ha az adapter támogatja
      - name: spot
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: boolean
        role: config
        optional: true
        default: false
        capability: spot
        description: Spot/preemptible instance (olcsóbb, megszakítható)

      # capability: tagging — csak ha az adapter támogatja
      - name: tags
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: collection
        collection_variant: list
        role: config
        optional: true
        capability: tagging
        description: Platform tag-ek (cost allocation, environment stb.)
        item_fields:
          - name: key
            shape_type: scalar
            scalar_type: string
            role: key
          - name: value
            shape_type: scalar
            scalar_type: string

  # ── StateSurface ─────────────────────────────────────────────────────────────
  state_surface:
    aggregate_ref: schemas/aggregate/state-surface.yaml
    source: compute-adapter
    freshness:
      ttl: 30s
      strategy: event-driven
    nodes:
      - name: power_state
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: string
        role: state
        mandatory: true
        description: >
          Aktuális energiaállapot — adapter normalizálja a platform értékeket.
          starting/stopping: tranziens állapot (boot folyamat, graceful shutdown, fizikai kivitel alatt).
          terminated: törlés/decommission folyamatban — objektum még létezik, adapter törli ha kész.
          paused: csak hypervisor képesség (capability: hypervisor_suspend).
        contract:
          - type: enum
            expression: [running, starting, stopping, stopped, paused, terminated, error, unknown]

      - name: ip_addresses
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: collection
        collection_variant: list
        role: state
        optional: true
        description: Kiosztott IP címek
        item_fields:
          - name: interface
            shape_type: scalar
            scalar_type: string
            role: key
          - name: address
            shape_type: scalar
            scalar_type: string
          - name: family
            shape_type: scalar
            scalar_type: string
            contract:
              - type: enum
                expression: [ipv4, ipv6]

      - name: uptime_seconds
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: operational
        optional: true

      # capability: resource_metrics
      - name: cpu_usage_pct
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: number
        role: operational
        optional: true
        capability: resource_metrics

      - name: memory_usage_mb
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: operational
        optional: true
        capability: resource_metrics

      # capability: hardware_monitoring
      - name: hardware_health
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: string
        role: state
        optional: true
        capability: hardware_monitoring
        contract:
          - type: enum
            expression: [ok, degraded, critical, unknown]

      - name: cpu_temperature_celsius
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: number
        role: operational
        optional: true
        capability: hardware_monitoring

      # capability: cloud
      - name: provider_id
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: string
        role: state
        optional: true
        capability: cloud
        description: Cloud provider belső instance ID

      # capability: spot
      - name: spot_interrupted
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: boolean
        role: state
        optional: true
        capability: spot

  # ── OperationSurface ─────────────────────────────────────────────────────────
  operation_surface:
    aggregate_ref: schemas/aggregate/operation-surface.yaml
    operations:

      # ── Core: minden adapter ──────────────────────────────────────────────────
      - name: start
        atomic_ref: schemas/atomic/behavior.yaml
        type: action
        idempotent: true
        description: Indítás
        input: null
        output:
          - name: power_state
            shape_type: scalar
            scalar_type: string

      - name: stop
        atomic_ref: schemas/atomic/behavior.yaml
        type: action
        idempotent: true
        description: Leállítás
        input:
          - name: force
            shape_type: scalar
            scalar_type: boolean
            default: false
        output:
          - name: power_state
            shape_type: scalar
            scalar_type: string

      # ── capability: restart ───────────────────────────────────────────────────
      - name: restart
        atomic_ref: schemas/atomic/behavior.yaml
        type: action
        idempotent: false
        capability: restart
        description: Újraindítás
        input:
          - name: force
            shape_type: scalar
            scalar_type: boolean
            default: false
        output:
          - name: power_state
            shape_type: scalar
            scalar_type: string

      # ── capability: resize ────────────────────────────────────────────────────
      - name: resize
        atomic_ref: schemas/atomic/behavior.yaml
        type: operation
        idempotent: false
        capability: resize
        description: >
          CPU/memória/disk módosítása. Az adapter dönti el: direkt spec
          (vm/physical/OCI flex) vagy legközelebbi instance_type lookup (AWS/GCP/Azure).
        input:
          - name: cpu_cores
            shape_type: scalar
            scalar_type: integer
            optional: true
          - name: memory_mb
            shape_type: scalar
            scalar_type: integer
            optional: true
          - name: disk_gb
            shape_type: scalar
            scalar_type: integer
            optional: true
        output:
          - name: job_id
            shape_type: scalar
            scalar_type: string

      # ── capability: snapshot ──────────────────────────────────────────────────
      - name: snapshot
        atomic_ref: schemas/atomic/behavior.yaml
        type: operation
        idempotent: false
        capability: snapshot
        description: Pillanatkép készítése
        input:
          - name: snapshot_name
            shape_type: scalar
            scalar_type: string
            mandatory: true
        output:
          - name: snapshot_id
            shape_type: scalar
            scalar_type: string

      # ── capability: live_migration ────────────────────────────────────────────
      - name: migrate
        atomic_ref: schemas/atomic/behavior.yaml
        type: operation
        idempotent: false
        capability: live_migration
        description: Élő migráció másik hostra (hypervisor)
        input:
          - name: target_host
            shape_type: scalar
            scalar_type: string
            mandatory: true
        output:
          - name: job_id
            shape_type: scalar
            scalar_type: string

      # ── capability: bare_metal_provision ─────────────────────────────────────
      - name: provision
        atomic_ref: schemas/atomic/behavior.yaml
        type: operation
        idempotent: false
        capability: bare_metal_provision
        description: OS telepítése PXE/network boot alapján (bare metal)
        input:
          - name: os_image
            shape_type: scalar
            scalar_type: string
            mandatory: true
        output:
          - name: job_id
            shape_type: scalar
            scalar_type: string

      # ── capability: cloud ─────────────────────────────────────────────────────
      - name: terminate
        atomic_ref: schemas/atomic/behavior.yaml
        type: operation
        idempotent: false
        capability: cloud
        description: Instance végleges törlése — MANUAL ONLY (confirm: mandatory)
        input:
          - name: confirm
            shape_type: scalar
            scalar_type: boolean
            mandatory: true
        output:
          - name: power_state
            shape_type: scalar
            scalar_type: string

  # ── NotificationSurface ──────────────────────────────────────────────────────
  notification_surface:
    events:
      - name: power-state-changed
        atomic_ref: schemas/atomic/event.yaml
        trigger: state_change
        severity: info
        description: Energiaállapot megváltozott
        payload:
          - name: previous_state
            shape_type: scalar
            scalar_type: string
          - name: current_state
            shape_type: scalar
            scalar_type: string

      # capability: resource_metrics
      - name: resource-threshold-exceeded
        atomic_ref: schemas/atomic/event.yaml
        trigger: threshold
        severity: warning
        capability: resource_metrics
        description: CPU vagy memória küszöb átlépve
        payload:
          - name: resource
            shape_type: scalar
            scalar_type: string
          - name: value
            shape_type: scalar
            scalar_type: number
          - name: threshold
            shape_type: scalar
            scalar_type: number

      # capability: hardware_monitoring
      - name: hardware-health-degraded
        atomic_ref: schemas/atomic/event.yaml
        trigger: state_change
        severity: warning
        capability: hardware_monitoring
        description: Hardver egészségi állapot romlott
        payload:
          - name: component
            shape_type: scalar
            scalar_type: string
          - name: health
            shape_type: scalar
            scalar_type: string

      - name: temperature-threshold-exceeded
        atomic_ref: schemas/atomic/event.yaml
        trigger: threshold
        severity: critical
        capability: hardware_monitoring
        description: CPU hőmérséklet kritikus küszöböt átlépett
        payload:
          - name: temperature_celsius
            shape_type: scalar
            scalar_type: number
          - name: threshold_celsius
            shape_type: scalar
            scalar_type: number

      # capability: spot
      - name: spot-interrupted
        atomic_ref: schemas/atomic/event.yaml
        trigger: explicit
        severity: critical
        capability: spot
        description: Spot/preemptible instance megszakítás (2 perces figyelmeztetés)
        payload:
          - name: termination_time
            shape_type: scalar
            scalar_type: string

  # ── BindingSurface ───────────────────────────────────────────────────────────
  binding_surface:
    addresses:
      - atomic_ref: schemas/atomic/address.yaml
        schema_path: "/cic-compute:resources/resource={backend},{provider},{location},{id}"
        api_path: "/restconf/data/cic-compute:resources/resource={backend},{provider},{location},{id}"
        logical_id: "cic:compute:{backend}:{provider}:{location}:{id}"
        namespace: "cic:compute"
        key_fields:
          - name: backend
            type: enum
            values: [vm, physical, cloud]
          - name: provider
            type: string
            description: >
              Ki kezeli az erőforrást — routing kulcs az adapter kiválasztásához.
              cloud: enum [aws, gcp, azure, hcloud, do, ovh]
              vm: hypervisor azonosítója (pl. proxmox-01, esxi-cluster-a)
              physical: datacenter/cluster azonosítója (pl. dc-ams-01)
          - name: location
            type: string
            description: >
              Hol fut az erőforrás.
              cloud: provider region (pl. eu-central-1, europe-west1) — kötelező
              vm: cluster/pool azonosítója vagy "-" ha a hypervisor kezeli
              physical: rack/zone azonosítója vagy "-" ha a datacenter kezeli
          - name: id
            type: string
    adapter: compute-adapter
    adapter_capabilities:
      description: >
        Az adapter deklarálja a támogatott capability-ket a binding rétegben.
        A schema felsorolja az összeset — az adapter szűri le, amit tud kezelni.
        Routing: backend + provider együtt azonosítja az adapter implementációt.
      known_adapters:
        - name: hypervisor-adapter
          backend: vm
          provider: "<hypervisor-id>"
          capabilities: [restart, resize, snapshot, live_migration, resource_metrics]
        - name: ipmi-adapter
          backend: physical
          provider: "<datacenter-id>"
          capabilities: [restart, bare_metal_provision, hardware_monitoring]
        - name: cloud-provider-adapter
          backend: cloud
          provider: [aws, gcp, azure, hcloud, do, ovh]
          capabilities: [cloud, restart, resize, spot, tagging]

# ── Levezetési lánc ───────────────────────────────────────────────────────────
derivation_chain:

  yang:
    module: cic-compute
    namespace: "urn:cic:compute"
    content: |
      module cic-compute {
        namespace "urn:cic:compute";
        prefix cic-c;

        list resource {
          key "backend provider location id";
          leaf backend   { type enumeration { enum vm; enum physical; enum cloud; } }
          leaf provider  { type string; }
          leaf location  { type string; }
          leaf id        { type string; }

          container config {
            leaf cpu-cores { type uint16; mandatory true; }
            leaf memory-mb { type uint32; mandatory true; }
            leaf disk-gb   { type uint32; mandatory true; }
            leaf os-image  { type string; mandatory true; }
            leaf spot      { type boolean; default false; }
            list network-interfaces {
              key name;
              leaf name        { type string; }
              leaf network     { type string; }
              leaf mac-address { type string; }
            }
            list tags {
              key key;
              leaf key   { type string; }
              leaf value { type string; }
            }
          }

          container state {
            config false;
            leaf power-state          { type enumeration { enum running; enum starting; enum stopping; enum stopped; enum paused; enum terminated; enum error; enum unknown; } }
            leaf uptime-seconds       { type uint64; }
            leaf cpu-usage-pct        { type decimal64 { fraction-digits 2; } }
            leaf memory-usage-mb      { type uint32; }
            leaf hardware-health      { type enumeration { enum ok; enum degraded; enum critical; enum unknown; } }
            leaf cpu-temp-celsius     { type decimal64 { fraction-digits 1; } }
            leaf provider-id          { type string; }
            leaf spot-interrupted     { type boolean; }
            list ip-addresses {
              key interface;
              leaf interface { type string; }
              leaf address   { type string; }
              leaf family    { type enumeration { enum ipv4; enum ipv6; } }
            }
          }

          action start     { output { leaf power-state { type string; } } }
          action stop      { input  { leaf force        { type boolean; default false; } } }
          action restart   { input  { leaf force        { type boolean; default false; } } }
          action snapshot  { input  { leaf snapshot-name { type string; mandatory true; } } output { leaf snapshot-id { type string; } } }
          action migrate   { input  { leaf target-host   { type string; mandatory true; } } output { leaf job-id     { type string; } } }
          action provision { input  { leaf os-image      { type string; mandatory true; } } output { leaf job-id     { type string; } } }
          action terminate { input  { leaf confirm        { type boolean; mandatory true; } } output { leaf power-state { type string; } } }
          action resize {
            input {
              leaf cpu-cores { type uint16; }
              leaf memory-mb { type uint32; }
              leaf disk-gb   { type uint32; }
            }
            output { leaf job-id { type string; } }
          }

          notification power-state-changed {
            leaf previous-state { type string; }
            leaf current-state  { type string; }
          }
          notification spot-interrupted {
            leaf termination-time { type string; }
          }
          notification hardware-health-degraded {
            leaf component { type string; }
            leaf health    { type string; }
          }
        }
      }

  restconf:
    collection: "GET /restconf/data/cic-compute:resources"
    instance:   "GET /restconf/data/cic-compute:resources/resource={backend},{provider},{location},{id}"
    config:
      read:   "GET   /restconf/data/cic-compute:resources/resource={backend},{provider},{location},{id}/config"
      update: "PUT   /restconf/data/cic-compute:resources/resource={backend},{provider},{location},{id}/config"
      patch:  "PATCH /restconf/data/cic-compute:resources/resource={backend},{provider},{location},{id}/config"
    state:
      read:   "GET   /restconf/data/cic-compute:resources/resource={backend},{provider},{location},{id}/state"
    operations:
      start:     "POST /restconf/operations/cic-compute:resources/resource={backend},{provider},{location},{id}/start"
      stop:      "POST /restconf/operations/cic-compute:resources/resource={backend},{provider},{location},{id}/stop"
      restart:   "POST /restconf/operations/cic-compute:resources/resource={backend},{provider},{location},{id}/restart"
      snapshot:  "POST /restconf/operations/cic-compute:resources/resource={backend},{provider},{location},{id}/snapshot"
      migrate:   "POST /restconf/operations/cic-compute:resources/resource={backend},{provider},{location},{id}/migrate"
      provision: "POST /restconf/operations/cic-compute:resources/resource={backend},{provider},{location},{id}/provision"
      terminate: "POST /restconf/operations/cic-compute:resources/resource={backend},{provider},{location},{id}/terminate"
      resize:    "POST /restconf/operations/cic-compute:resources/resource={backend},{provider},{location},{id}/resize"
    events:
      stream: "GET /restconf/streams/cic-compute-events"

  runtime:
    reconcile_loop: |
      1. observe:   adapter.get(backend, provider, location, id) → state_surface
      2. compare:   diff(config_surface, state_surface) → drift?
      3. if drift:
           power_state wrong  → start/stop
           cpu/memory changed → resize(cpu_cores, memory_mb) — adapter fordítja le platformra
           disk_gb changed    → resize(disk_gb) — adapter kezeli
           os_image changed   → provision (physical/vm) | MANUAL ONLY (cloud: terminate+reprovision)
      4. emit:      capability-specifikus events ha adapter jelzi
    adapter_note: >
      resize: az adapter dönti el a fordítási stratégiát —
        vm/physical/OCI flex: direkt cpu/memory spec,
        AWS/GCP/Azure fixed shapes: legközelebbi instance_type lookup.
