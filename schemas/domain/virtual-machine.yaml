---
metadata:
  name: VirtualMachine
  version: v0.0.dev
  description: >
    Virtual Machine mint ManagedEntity specializáció.
    Hypervisor-független compute egység: KVM, VMware, cloud instance egyaránt
    leírható ezzel a DomainComposition-nel.
  owner: Gabor Zoltan Sinko
  tags:
    - domain-composition
    - compute
    - virtual-machine
  validatedBy:
    name: cic-primitives
    version: v0.1.0

spec:
  kind: DomainComposition
  base:
    aggregate: ManagedEntity
    ref: schemas/aggregate/managed-entity.yaml

  # ── Identity ────────────────────────────────────────────────────────────────
  identity:
    atomic_ref: schemas/atomic/identity.yaml
    kind: VirtualMachine
    namespace: "cic:compute"
    version: v0.1.dev
    base: "cic:core:ManagedEntity"
    abstract: false
    description: Hypervisor-független virtuális gép

  # ── ConfigSurface ────────────────────────────────────────────────────────────
  config_surface:
    aggregate_ref: schemas/aggregate/config-surface.yaml
    nodes:
      - name: cpu_cores
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: config
        mandatory: true
        description: Virtuális CPU magok száma
        contract:
          - type: range
            expression: "1..256"
            error_message: cpu_cores értéke 1 és 256 között kell legyen

      - name: memory_mb
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: config
        mandatory: true
        description: Memória mérete MB-ban
        contract:
          - type: range
            expression: "128..1048576"
            error_message: memory_mb értéke 128 MB és 1 TB között kell legyen

      - name: disk_gb
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: config
        mandatory: true
        description: Elsődleges lemez mérete GB-ban
        contract:
          - type: range
            expression: "1..65536"
            error_message: disk_gb értéke 1 és 65536 GB között kell legyen

      - name: os_image
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: string
        role: config
        mandatory: true
        description: OS image azonosítója (pl. ubuntu-22.04, windows-server-2022)

      - name: network_interfaces
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: collection
        collection_variant: list
        role: config
        optional: true
        description: Hálózati interfészek listája
        item_fields:
          - name: name
            shape_type: scalar
            scalar_type: string
            role: key
          - name: network
            shape_type: scalar
            scalar_type: string
            description: Hálózat neve vagy ID-ja
          - name: mac_address
            shape_type: scalar
            scalar_type: string
            optional: true

  # ── StateSurface ─────────────────────────────────────────────────────────────
  state_surface:
    aggregate_ref: schemas/aggregate/state-surface.yaml
    source: hypervisor-adapter
    freshness:
      ttl: 30s
      strategy: event-driven
    nodes:
      - name: power_state
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: string
        role: state
        description: Aktuális energiaállapot
        contract:
          - type: enum
            expression: [running, stopped, paused, suspended, migrating, error, unknown]

      - name: uptime_seconds
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: operational
        optional: true
        description: Futásidő másodpercben

      - name: cpu_usage_pct
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: number
        role: operational
        optional: true
        description: CPU kihasználtság százalékban

      - name: memory_usage_mb
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: scalar
        scalar_type: integer
        role: operational
        optional: true
        description: Aktuális memóriahasználat MB-ban

      - name: ip_addresses
        atomic_ref: schemas/atomic/shape.yaml
        shape_type: collection
        collection_variant: list
        role: state
        optional: true
        description: Kiosztott IP címek
        item_fields:
          - name: interface
            shape_type: scalar
            scalar_type: string
            role: key
          - name: address
            shape_type: scalar
            scalar_type: string
          - name: family
            shape_type: scalar
            scalar_type: string
            contract:
              - type: enum
                expression: [ipv4, ipv6]

  # ── OperationSurface ─────────────────────────────────────────────────────────
  operation_surface:
    aggregate_ref: schemas/aggregate/operation-surface.yaml
    operations:
      - name: start
        atomic_ref: schemas/atomic/behavior.yaml
        type: action
        idempotent: true
        description: VM indítása
        input: null
        output:
          - name: power_state
            shape_type: scalar
            scalar_type: string

      - name: stop
        atomic_ref: schemas/atomic/behavior.yaml
        type: action
        idempotent: true
        description: VM leállítása (graceful)
        input:
          - name: force
            shape_type: scalar
            scalar_type: boolean
            default: false
        output:
          - name: power_state
            shape_type: scalar
            scalar_type: string

      - name: restart
        atomic_ref: schemas/atomic/behavior.yaml
        type: action
        idempotent: false
        description: VM újraindítása
        input:
          - name: force
            shape_type: scalar
            scalar_type: boolean
            default: false
        output:
          - name: power_state
            shape_type: scalar
            scalar_type: string

      - name: snapshot
        atomic_ref: schemas/atomic/behavior.yaml
        type: operation
        idempotent: false
        description: VM pillanatkép készítése
        input:
          - name: snapshot_name
            shape_type: scalar
            scalar_type: string
            mandatory: true
        output:
          - name: snapshot_id
            shape_type: scalar
            scalar_type: string

      - name: migrate
        atomic_ref: schemas/atomic/behavior.yaml
        type: operation
        idempotent: false
        description: VM élő migráció másik hypervisorra
        input:
          - name: target_host
            shape_type: scalar
            scalar_type: string
            mandatory: true
        output:
          - name: job_id
            shape_type: scalar
            scalar_type: string

  # ── NotificationSurface ──────────────────────────────────────────────────────
  notification_surface:
    events:
      - name: power-state-changed
        atomic_ref: schemas/atomic/event.yaml
        trigger: state_change
        severity: info
        description: VM energiaállapot megváltozott
        payload:
          - name: previous_state
            shape_type: scalar
            scalar_type: string
          - name: current_state
            shape_type: scalar
            scalar_type: string

      - name: resource-threshold-exceeded
        atomic_ref: schemas/atomic/event.yaml
        trigger: threshold
        severity: warning
        description: CPU vagy memória küszöbérték átlépve
        payload:
          - name: resource
            shape_type: scalar
            scalar_type: string
          - name: value
            shape_type: scalar
            scalar_type: number
          - name: threshold
            shape_type: scalar
            scalar_type: number

  # ── BindingSurface ───────────────────────────────────────────────────────────
  binding_surface:
    addresses:
      - atomic_ref: schemas/atomic/address.yaml
        schema_path: "/cic-compute:vms/vm={namespace},{id}"
        api_path: "/restconf/data/cic-compute:vms/vm={namespace},{id}"
        logical_id: "cic:compute:{namespace}:{id}"
        namespace: "cic:compute"
    adapter: hypervisor-adapter

# ── Levezetési lánc ───────────────────────────────────────────────────────────
derivation_chain:

  yang:
    module: cic-compute-vm
    namespace: "urn:cic:compute:vm"
    content: |
      module cic-compute-vm {
        namespace "urn:cic:compute:vm";
        prefix cic-vm;

        list vm {
          key "namespace id";
          leaf namespace { type string; }
          leaf id        { type string; }

          container config {
            leaf cpu-cores  { type uint16; mandatory true; }
            leaf memory-mb  { type uint32; mandatory true; }
            leaf disk-gb    { type uint32; mandatory true; }
            leaf os-image   { type string; mandatory true; }
            list network-interfaces {
              key name;
              leaf name    { type string; }
              leaf network { type string; }
            }
          }

          container state {
            config false;
            leaf power-state    { type enumeration { enum running; enum stopped; enum paused; enum migrating; enum error; } }
            leaf uptime-seconds { type uint64; }
            leaf cpu-usage-pct  { type decimal64 { fraction-digits 2; } }
            leaf memory-usage-mb { type uint32; }
            list ip-addresses {
              key interface;
              leaf interface { type string; }
              leaf address   { type string; }
            }
          }

          action start   { output { leaf power-state { type string; } } }
          action stop    { input { leaf force { type boolean; default false; } } }
          action restart { input { leaf force { type boolean; default false; } } }

          notification power-state-changed {
            leaf previous-state { type string; }
            leaf current-state  { type string; }
          }
        }
      }

  restconf:
    collection: "GET /restconf/data/cic-compute:vms"
    instance:   "GET /restconf/data/cic-compute:vms/vm={namespace},{id}"
    config:
      read:   "GET   /restconf/data/cic-compute:vms/vm={namespace},{id}/config"
      update: "PUT   /restconf/data/cic-compute:vms/vm={namespace},{id}/config"
      patch:  "PATCH /restconf/data/cic-compute:vms/vm={namespace},{id}/config"
    state:
      read:   "GET   /restconf/data/cic-compute:vms/vm={namespace},{id}/state"
    operations:
      start:    "POST /restconf/operations/cic-compute:vms/vm={namespace},{id}/start"
      stop:     "POST /restconf/operations/cic-compute:vms/vm={namespace},{id}/stop"
      restart:  "POST /restconf/operations/cic-compute:vms/vm={namespace},{id}/restart"
      snapshot: "POST /restconf/operations/cic-compute:vms/vm={namespace},{id}/snapshot"
      migrate:  "POST /restconf/operations/cic-compute:vms/vm={namespace},{id}/migrate"
    events:
      stream: "GET /restconf/streams/cic-compute-vm-events"

  runtime:
    reconcile_loop: |
      1. observe:   hypervisor-adapter.get_vm(namespace, id) → state_surface
      2. compare:   diff(config_surface, state_surface) → drift?
      3. if drift:
           cpu/memory changed → hypervisor-adapter.resize(...)
           power_state wrong  → start/stop action
           os_image changed   → rebuild (stop → reprovision → start)
      4. emit:      power-state-changed event ha power_state eltért
    adapter_contract:
      observe: "GET hypervisor API /vms/{id}"
      apply:   "PATCH hypervisor API /vms/{id}"
      watch:   "WS hypervisor API /vms/{id}/events"
