---
metadata:
  name: cloud-provider-adapter
  version: v0.0.dev
  description: >
    Cloud provider adapter interface contract — ComputeResource (backend: cloud) runtime kötése.
    Bármely cloud provider implementálhatja. Ez NEM implementáció — ez az interface
    amit minden cloud provider adapternek teljesítenie kell.
  owner: Gabor Zoltan Sinko
  tags:
    - adapter-contract
    - compute
    - cloud
  validatedBy:
    name: cic-primitives
    version: v0.1.0

spec:
  kind: AdapterContract
  domain: "cic:compute:ComputeResource"
  backend: cloud
  protocol: "cloud-provider-api"

  address:
    description: >
      Négykomponensű azonosítás — megfelel a ComputeResource address kulcsának:
      {backend}/{provider}/{location}/{id}
    fields:
      - name: backend
        type: string
        value: cloud
        description: Mindig "cloud" ennél az adapternél
      - name: provider
        type: enum
        mandatory: true
        values: [aws, gcp, azure, hcloud, do, ovh, oci]
        description: Cloud provider azonosítója — routing kulcs
      - name: location
        type: string
        mandatory: true
        description: Provider-specifikus régió (pl. eu-central-1, europe-west1, westeurope)
      - name: id
        type: string
        mandatory: true
        description: Instance azonosítója a provider rendszerében

  operations:

    observe:
      description: Instance aktuális állapotának lekérdezése → state_surface normalizálva
      input: address
      output:
        - name: power_state
          type: string
          mandatory: true
          maps_to: state_surface.power_state
          note: >
            Az adapter normalizálja a provider-specifikus értékeket:
            pending → starting, shutting-down → stopping, terminated → terminated
          contract:
            - type: enum
              expression: [running, starting, stopping, stopped, paused, terminated, error, unknown]
        - name: ip_addresses
          type: list
          optional: true
          maps_to: state_surface.ip_addresses
          item_fields:
            - name: interface
              type: string
            - name: address
              type: string
            - name: family
              type: enum
              values: [ipv4, ipv6]
        - name: provider_id
          type: string
          mandatory: true
          maps_to: state_surface.provider_id
        - name: spot_interrupted
          type: boolean
          optional: true
          maps_to: state_surface.spot_interrupted

    watch:
      description: Aszinkron állapotváltozás stream — push vagy polling
      protocol: event-stream
      fallback: polling
      poll_interval_seconds: 30
      events:
        - name: power-state-changed
          trigger: state_change
        - name: spot-interrupted
          trigger: explicit

    start:
      description: Instance indítása
      idempotent: true
      precondition: power_state == stopped
      postcondition: power_state == running

    stop:
      description: Instance leállítása
      idempotent: true
      input:
        - name: force
          type: boolean
          default: false
      precondition: power_state == running
      postcondition: power_state == stopped

    restart:
      description: Instance újraindítása
      idempotent: false
      input:
        - name: force
          type: boolean
          default: false
      precondition: power_state == running
      postcondition: power_state == running

    terminate:
      description: Instance végleges törlése — IRREVERSIBLE, MANUAL ONLY
      idempotent: false
      input:
        - name: confirm
          type: boolean
          mandatory: true
      precondition: confirm == true
      postcondition: power_state == terminated
      note: >
        Nem hívható automatikus reconcile loop-ból.
        Kizárólag explicit operátori megerősítéssel (confirm: true).
        Az objektum terminated állapotban marad amíg az adapter teljesen eltávolítja.

    resize:
      description: >
        Erőforrás módosítása cpu_cores/memory_mb/disk_gb alapján.
        Az adapter dönti el a fordítási stratégiát:
          OCI Flex shapes: direkt cpu/memory spec átadása
          AWS/GCP/Azure fixed shapes: legközelebbi instance_type keresés a lookup táblából
      idempotent: false
      input:
        - name: cpu_cores
          type: integer
          optional: true
        - name: memory_mb
          type: integer
          optional: true
        - name: disk_gb
          type: integer
          optional: true
      output:
        - name: job_id
          type: string
      precondition: power_state == stopped
      note: Legalább egy input mező kötelező.

  known_implementations:
    - name: aws-ec2-adapter
      provider: aws
    - name: gcp-compute-adapter
      provider: gcp
    - name: azure-compute-adapter
      provider: azure
    - name: hcloud-adapter
      provider: hcloud
    - name: ovh-adapter
      provider: ovh
    - name: oci-compute-adapter
      provider: oci
