---
metadata:
  name: hypervisor-adapter
  version: v0.0.dev
  description: >
    Hypervisor adapter interface contract — VirtualMachine DomainComposition runtime kötése.
    KVM, VMware, Proxmox, qemu bármelyike implementálhatja.
    Ez NEM implementáció — ez az interface amit minden hypervisor adapternek teljesítenie kell.
  owner: Gabor Zoltan Sinko
  tags:
    - adapter-contract
    - compute
    - hypervisor
  validatedBy:
    name: cic-primitives
    version: v0.1.0

spec:
  kind: AdapterContract
  domain: "cic:compute:VirtualMachine"
  protocol: "hypervisor-api"

  operations:

    observe:
      description: VM aktuális állapotának lekérdezése → state_surface
      input:
        - name: namespace
          type: string
          mandatory: true
        - name: id
          type: string
          mandatory: true
      output:
        - name: power_state
          type: string
          maps_to: state_surface.power_state
        - name: uptime_seconds
          type: integer
          maps_to: state_surface.uptime_seconds
        - name: cpu_usage_pct
          type: number
          maps_to: state_surface.cpu_usage_pct
        - name: memory_usage_mb
          type: integer
          maps_to: state_surface.memory_usage_mb
        - name: ip_addresses
          type: list
          maps_to: state_surface.ip_addresses

    apply:
      description: Config változás alkalmazása → config_surface → VM
      input:
        - name: cpu_cores
          type: integer
          maps_to: config_surface.cpu_cores
        - name: memory_mb
          type: integer
          maps_to: config_surface.memory_mb
      precondition: power_state == stopped

    watch:
      description: Event stream feliratkozás — aszinkron állapotváltozások
      protocol: websocket
      events:
        - name: power-state-changed
          trigger: state_change
        - name: vm-error
          trigger: explicit

    start:
      description: VM indítása
      idempotent: true
      precondition: power_state == stopped
      postcondition: power_state == running

    stop:
      description: VM leállítása
      idempotent: true
      input:
        - name: force
          type: boolean
          default: false
      precondition: power_state == running
      postcondition: power_state == stopped

    restart:
      description: VM újraindítása
      idempotent: false
      input:
        - name: force
          type: boolean
          default: false

    snapshot:
      description: VM pillanatkép készítése
      idempotent: false
      input:
        - name: snapshot_name
          type: string
          mandatory: true
      output:
        - name: snapshot_id
          type: string

    migrate:
      description: VM élő migráció másik hypervisorra
      idempotent: false
      input:
        - name: target_host
          type: string
          mandatory: true
      output:
        - name: job_id
          type: string
      precondition: power_state == running

  known_implementations:
    - name: kvm-adapter
      protocol_details: "libvirt XML API / QEMU QMP"
    - name: vmware-adapter
      protocol_details: "VMware vSphere API (govmomi)"
    - name: proxmox-adapter
      protocol_details: "Proxmox VE REST API"
