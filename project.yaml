project:
  name: cic-compute
  description: CIC compute domain — virtual machines, bare metal and cloud instances as ManagedEntity specializations derived from cic-primitives
  license: CC-BY-NC-SA-4.0
  main_branch: compute/main
  owner: Gabor Zoltan Sinko
  maintenance:
    status: active
    supported_until: '2027-12-31'
  contacts:
    - type: email
      value: sinkog@centralinfracore.hu
  links:
    - name: repository
      url: https://github.com/CentralInfraCore/cic-compute.git

compiler_settings:
  meta_schemas_dir: ./
  source_dir: schemas
  meta_schema_file: md.meta.schema.yaml
  primitive_schema_file: schemas/index.yaml
  vault_key_name: cic-my-sign-key

x-cic:
  repo_type: domain
  base_primitive: cic-primitives@v0.1.0
