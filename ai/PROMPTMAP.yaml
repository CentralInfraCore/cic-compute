version: 1
context: cic-compute

# Státuszok: pending | in_progress | done | blocked

entries:

  # ── Phase 1: Bootstrap ──────────────────────────────────────────────────────

  - task: "repo-bootstrap"
    status: done
    priority: 1
    milestone: bootstrap
    prompt: |
      Bootstrap cic-compute repót cic-primitives@v0.1.0-ból:
        git remote add base git@github.com:CentralInfraCore/cic-primitives.git
        git fetch base && git merge primitives/@v0.1.0 --allow-unrelated-histories
      project.yaml, dependency.yaml testreszabása. make repo.init (hook-ok).
    accept: make validate
    produces:
      - project.yaml
      - dependency.yaml
    checks:
      - make validate

  - task: "virtual-machine-domain"
    status: done
    priority: 2
    milestone: bootstrap
    blocked_by: "repo-bootstrap"
    prompt: |
      Hozd létre az első DomainComposition-t: VirtualMachine mint ManagedEntity specializáció.
      Fájl: schemas/domain/virtual-machine.yaml
      config: cpu_cores, memory_mb, disk_gb, os_image, network_interfaces
      state: power_state, uptime, cpu/memory usage, ip_addresses
      ops: start, stop, restart, snapshot, migrate
      derivation_chain: YANG + RESTCONF + runtime dokumentálva
    accept: make validate
    produces:
      - schemas/domain/virtual-machine.yaml
    checks:
      - make validate
    notes: |
      D-008 nyitott: defaulted slot felülírás nem történt még — első override-nál dől el.

  # ── Phase 2: Domain bővítés ─────────────────────────────────────────────────

  - task: "physical-machine-domain"
    status: pending
    priority: 3
    milestone: domain-expansion
    blocked_by: "virtual-machine-domain"
    prompt: |
      Hozd létre a PhysicalMachine DomainComposition-t: schemas/domain/physical-machine.yaml
      VirtualMachine-hoz képest különbségek:
        - nincs migrate művelet
        - cpu_model, bmc_address config mezők
        - hardware_health state mező (ok | degraded | critical)
        - power ciklus: IPMI/Redfish alapú
      Adapter: ipmi-adapter vagy redfish-adapter
    accept: make validate
    produces:
      - schemas/domain/physical-machine.yaml
    checks:
      - make validate

  - task: "cloud-instance-domain"
    status: pending
    priority: 4
    milestone: domain-expansion
    blocked_by: "virtual-machine-domain"
    prompt: |
      Hozd létre a CloudInstance DomainComposition-t: schemas/domain/cloud-instance.yaml
      Cloud-specifikus különbségek VirtualMachine-hoz képest:
        - instance_type (pl. t3.medium) cpu/memory helyett
        - region, availability_zone, cloud_provider (aws|gcp|azure|hcloud)
        - spot/preemptible flag (defaulted: false)
        - public_ip, private_ip state
        - terminate (nem stop) lifecycle művelet
      Adapter: cloud-provider-adapter
    accept: make validate
    produces:
      - schemas/domain/cloud-instance.yaml
    checks:
      - make validate

  # ── Phase 3: Adapter contracts ──────────────────────────────────────────────

  - task: "hypervisor-adapter-contract"
    status: pending
    priority: 5
    milestone: adapter-contracts
    blocked_by: "virtual-machine-domain"
    prompt: |
      Definiáld a hypervisor-adapter contract-ját: schemas/adapters/hypervisor-adapter.yaml
      Ez NEM implementáció — interface contract:
        observe: GET /vms/{id} → VirtualMachine state_surface
        apply:   PATCH /vms/{id} → config_surface alkalmazása
        watch:   WS /vms/{id}/events → event stream
        actions: start, stop, restart, snapshot, migrate
      Adapter-agnosztikus: KVM, VMware, Proxmox mind implementálja.
    accept: make validate
    produces:
      - schemas/adapters/hypervisor-adapter.yaml
    checks:
      - make validate

  - task: "ipmi-adapter-contract"
    status: pending
    priority: 6
    milestone: adapter-contracts
    blocked_by: "physical-machine-domain"
    prompt: |
      Definiáld az ipmi-adapter contract-ját: schemas/adapters/ipmi-adapter.yaml
      IPMI/Redfish alapú fizikai gép adapter interface:
        observe: Redfish GET /Systems/{id}
        apply:   power on/off, reset
        watch:   IPMI SEL (System Event Log)
    accept: make validate
    produces:
      - schemas/adapters/ipmi-adapter.yaml
    checks:
      - make validate

  # ── Phase 4: Első signed release ────────────────────────────────────────────

  - task: "signed-release"
    status: pending
    priority: 7
    milestone: release
    blocked_by: "physical-machine-domain"
    prompt: |
      Hozd létre az első signed release artifact-ot.
      Release branch: compute/releases/v0.1.0
      Előfeltétel: Vault Transit kulcs elérhető.
      make release → compute/@v0.1.0 tag
    accept: make validate && git tag -l "compute/@v*"
    checks:
      - make validate
      - git tag -l "compute/@v*"
